{% extends "base.html" %}
{% block title %}500 — Server Error{% endblock %}
{% block content %}
<div class="text-center py-5">
  <i class="bi bi-exclamation-triangle display-1 text-danger d-block mb-3"></i>
  <h1 class="display-4 fw-bold">500</h1>
  <h4 class="text-muted mb-3">Internal Server Error</h4>
  <p class="text-muted">Something went wrong on our end. Please try again.</p>
  <a href="{{ url_for('dashboard.index') }}" class="btn btn-accent mt-3">
    <i class="bi bi-house me-2"></i>Back to Dashboard
  </a>
</div>
{% endblock %}
